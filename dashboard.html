};

// Initialize Firebase
if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const auth = firebase.auth();

const ALLOWED_EMAIL = "anasbenjelloun61@gmail.com";

function togglePassword(){
  const pass = document.getElementById("pass");
  const icon = document.querySelector(".toggle-password");
  if(pass.type === "password"){
    pass.type = "text";
    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");
  }else{
    pass.type = "password";
    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");
  }
}

async function login(){
  const email = document.getElementById("user").value;
  const password = document.getElementById("pass").value;
  const errorDiv = document.getElementById("error");
  
  errorDiv.innerText = "";
  
  if(email !== ALLOWED_EMAIL){
    errorDiv.innerText = "❌ غير مسموح لك بدخول لوحة التحكم";
    return;
  }
  
  try {
    await auth.signInWithEmailAndPassword(email, password);
    document.getElementById("loginCard").style.display = "none";
    document.getElementById("success").style.display = "block";
    setTimeout(() => {
      document.getElementById("success").style.display = "none";
      loadFullDashboard();
    }, 1200);
  } catch(error) {
    if(error.code === 'auth/user-not-found'){
      errorDiv.innerText = "❌ هذا البريد غير مسجل";
    } else if(error.code === 'auth/wrong-password'){
      errorDiv.innerText = "❌ كلمة المرور غير صحيحة";
    } else {
      errorDiv.innerText = "❌ خطأ: " + error.message;
    }
  }
}

function initDashboardFirebase(logoutModal) {
  let allOrders = [];
  let currentPage = 'orders';
  let currentSearch = '';
  let currentFilter = 'all';
  let selectedDate = null;
  let orderToDelete = null;
  
  // Logout functionality
  const logoutBtn = document.getElementById('logoutBtn');
  if (logoutBtn) {
    logoutBtn.addEventListener('click', () => {
      logoutModal.classList.add('active');
    });
  }
  
  const cancelLogoutBtn = document.getElementById('cancelLogoutBtn');
  const confirmLogoutBtn = document.getElementById('confirmLogoutBtn');
  
  if (cancelLogoutBtn) {
    cancelLogoutBtn.addEventListener('click', () => {
      logoutModal.classList.remove('active');
    });
  }
  
  if (confirmLogoutBtn) {
    confirmLogoutBtn.addEventListener('click', async () => {
      logoutModal.classList.remove('active');
      await auth.signOut();
      window.location.reload();
    });
  }
  
  // Close modal when clicking outside
  logoutModal.addEventListener('click', (e) => {
    if (e.target === logoutModal) {
      logoutModal.classList.remove('active');
    }
  });
  
  // Flatpickr
  flatpickr("#datePicker", {
    dateFormat: "Y-m-d",
    onChange: (dates, dateStr) => {
      if (dateStr) {
        selectedDate = dateStr;
        currentFilter = 'custom';
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        renderCurrentPage();
      }
    }
  });
  
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentFilter = btn.dataset.filter;
      selectedDate = null;
      document.getElementById('datePicker').value = '';
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCurrentPage();
    });
  });
  
  function filterByDate(order) {
    const orderDate = new Date(order.date);
    const today = new Date(); today.setHours(0,0,0,0);
    const yesterday = new Date(today); yesterday.setDate(yesterday.getDate()-1);
    const weekAgo = new Date(today); weekAgo.setDate(weekAgo.getDate()-7);
    const monthAgo = new Date(today); monthAgo.setMonth(monthAgo.getMonth()-1);
    switch(currentFilter) {
      case 'today': return orderDate.toDateString() === today.toDateString();
      case 'yesterday': return orderDate.toDateString() === yesterday.toDateString();
      case 'week': return orderDate >= weekAgo;
      case 'month': return orderDate >= monthAgo;
      case 'custom': return selectedDate ? orderDate.toISOString().split('T')[0] === selectedDate : true;
      default: return true;
    }
  }
  
  async function loadOrders() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '<tr><td colspan="10" class="loading-state"><i class="fas fa-spinner fa-pulse"></i> Loading...<\/td><\/tr>';
    try {
      const snapshot = await db.collection('orders').orderBy('createdAt', 'desc').get();
      allOrders = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        allOrders.push({
          id: doc.id,
          orderId: data.orderId || doc.id.slice(0,8),
          customer: data.customerName || data.customer || "Guest",
          phone: data.phone || "N/A",
          total: data.total || 0,
          date: data.orderDate || (data.createdAt?.toDate?.()?.toLocaleDateString()) || new Date().toLocaleDateString(),
          status: data.orderStatus || data.status || "pending",
          items: data.items || []
        });
      });
      renderCurrentPage();
    } catch(e) {
      tbody.innerHTML = `</table><td colspan="10" class="empty-state">Error: ${e.message}<\/td><\/tr>`;
    }
  }
  
  async function deleteOrder(id) {
    await db.collection('orders').doc(id).delete();
    await loadOrders();
    document.getElementById('detailsPanel').classList.remove('open');
  }
  
  function renderCurrentPage() {
    if(currentPage === 'orders') renderOrders();
    else if(currentPage === 'customers') renderCustomers();
    else if(currentPage === 'stores') renderStores();
    else if(currentPage === 'analytics') renderAnalytics();
  }
  
  function renderOrders() {
    let filtered = allOrders.filter(o => filterByDate(o));
    if(currentSearch) {
      const s = currentSearch.toLowerCase();
      filtered = filtered.filter(o => o.orderId.toLowerCase().includes(s) || o.customer.toLowerCase().includes(s) || o.phone.includes(s));
    }
    const rev = filtered.reduce((s,o) => s + o.total,0);
    const pending = filtered.filter(o => o.status === 'pending').length;
    const completed = filtered.filter(o => o.status === 'completed').length;
    document.getElementById('statsContainer').innerHTML = `
      <div class="stat-card"><div class="stat-info"><h3>Total Orders</h3><div class="stat-number">${filtered.length}</div></div><div class="stat-icon"><i class="fas fa-shopping-cart"></i></div></div>
      <div class="stat-card"><div class="stat-info"><h3>Revenue</h3><div class="stat-number">${rev.toLocaleString()} MAD</div></div><div class="stat-icon"><i class="fas fa-money-bill-wave"></i></div></div>
      <div class="stat-card"><div class="stat-info"><h3>Pending</h3><div class="stat-number">${pending}</div></div><div class="stat-icon"><i class="fas fa-clock"></i></div></div>
      <div class="stat-card"><div class="stat-info"><h3>Completed</h3><div class="stat-number">${completed}</div></div><div class="stat-icon"><i class="fas fa-check-circle"></i></div></div>
    `;
    document.getElementById('tableHeader').innerHTML = `<tr><th>ORDER ID</th><th>CUSTOMER</th><th>PHONE</th><th>TOTAL</th><th>DATE</th><th>STATUS</th><th>ITEMS</th><th>ACTIONS</th><\/tr>`;
    const tbody = document.getElementById('tableBody');
    if(!filtered.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty-state">No orders found<\/td><\/tr>'; return; }
    tbody.innerHTML = filtered.map(o => `
      <tr>
        <td><strong>${o.orderId}</strong><\/td>
        <td><i class="fas fa-user"></i> ${o.customer}<\/td>
        <td><i class="fas fa-phone"></i> ${o.phone}<\/td>
        <td>${o.total.toLocaleString()} MAD<\/td>
        <td>${o.date}<\/td>
        <td><span class="status-badge status-${o.status}"><i class="fas ${o.status === 'pending' ? 'fa-hourglass-half' : 'fa-check'}"></i> ${o.status}<\/span><\/td>
        <td>${o.items?.length || 0} items<\/td>
        <td class="action-buttons">
          <button class="view-btn" onclick="window.dashboardShowDetails('${o.id}')"><i class="fas fa-eye"><\/i><\/button>
          <button class="delete-btn" onclick="window.dashboardConfirmDelete('${o.id}')"><i class="fas fa-trash-alt"><\/i><\/button>
        <\/td>
      <\/tr>
    `).join('');
  }
  
  function renderCustomers() {
    let filtered = allOrders.filter(o => filterByDate(o));
    const map = new Map();
    filtered.forEach(o => {
      if(!map.has(o.phone)) map.set(o.phone, { name: o.customer, phone: o.phone, orders: 0, total: 0 });
      const c = map.get(o.phone);
      c.orders++; c.total += o.total;
    });
    let customers = Array.from(map.values());
    if(currentSearch) customers = customers.filter(c => c.name.toLowerCase().includes(currentSearch.toLowerCase()) || c.phone.includes(currentSearch));
    const totalSpent = customers.reduce((s,c) => s + c.total,0);
    document.getElementById('statsContainer').innerHTML = `
      <div class="stat-card"><div class="stat-info"><h3>Total Customers</h3><div class="stat-number">${customers.length}</div></div><div class="stat-icon"><i class="fas fa-users"></i></div></div>
      <div class="stat-card"><div class="stat-info"><h3>Total Spent</h3><div class="stat-number">${totalSpent.toLocaleString()} MAD</div></div><div class="stat-icon"><i class="fas fa-coins"></i></div></div>
      <div class="stat-card"><div class="stat-info"><h3>Avg per Customer</h3><div class="stat-number">${Math.round(totalSpent/customers.length)||0} MAD</div></div><div class="stat-icon"><i class="fas fa-chart-line"></i></div></div>
      <div class="stat-card"><div class="stat-info"><h3>Total Orders</h3><div class="stat-number">${filtered.length}</div></div><div class="stat-icon"><i class="fas fa-shopping-bag"></i></div></div>
    `;
    document.getElementById('tableHeader').innerHTML = `<tr><th>CUSTOMER</th><th>PHONE</th><th>ORDERS</th><th>TOTAL SPENT</th><\/tr>`;
    document.getElementById('tableBody').innerHTML = customers.map(c => `<tr><td><i class="fas fa-user-circle"></i> ${c.name}<\/td><td>${c.phone}<\/td><td>${c.orders}<\/td><td>${c.total.toLocaleString()} MAD<\/td><\/tr>`).join('');
  }
  
  function renderStores() {
    let filtered = allOrders.filter(o => filterByDate(o));
    const store = { name: "Fleuriste Marrakech", orders: filtered.length, revenue: filtered.reduce((s,o) => s + o.total,0) };
    document.getElementById('statsContainer').innerHTML = `
      <div class="stat-card"><div class="stat-info"><h3>Total Stores</h3><div class="stat-number">1</div></div><div class="stat-icon"><i class="fas fa-store"></i></div></div>
      <div class="stat-card"><div class="stat-info"><h3>Total Revenue</h3><div class="stat-number">${store.revenue.toLocaleString()} MAD</div></div><div class="stat-icon"><i class="fas fa-chart-bar"></i></div></div>
      <div class="stat-card"><div class="stat-info"><h3>Total Orders</h3><div class="stat-number">${store.orders}</div></div><div class="stat-icon"><i class="fas fa-box"></i></div></div>
    `;
    document.getElementById('tableHeader').innerHTML = `<table><th>STORE NAME</th><th>TOTAL ORDERS</th><th>TOTAL REVENUE</th><\/tr>`;
    document.getElementById('tableBody').innerHTML = `<tr><td><i class="fas fa-store"></i> ${store.name}<\/td><td>${store.orders}<\/td><td>${store.revenue.toLocaleString()} MAD<\/td><\/tr>`;
  }
  
  function renderAnalytics() {
    let filtered = allOrders.filter(o => filterByDate(o));
    const rev = filtered.reduce((s,o) => s + o.total,0);
    const avg = filtered.length ? Math.round(rev/filtered.length) : 0;
    const completed = filtered.filter(o => o.status === 'completed').length;
    const rate = filtered.length ? Math.round((completed/filtered.length)*100) : 0;
    document.getElementById('statsContainer').innerHTML = `
      <div class="stat-card"><div class="stat-info"><h3>Total Revenue</h3><div class="stat-number">${rev.toLocaleString()} MAD</div></div><div class="stat-icon"><i class="fas fa-chart-line"></i></div></div>
      <div class="stat-card"><div class="stat-info"><h3>Average Order</h3><div class="stat-number">${avg.toLocaleString()} MAD</div></div><div class="stat-icon"><i class="fas fa-chart-simple"></i></div></div>
      <div class="stat-card"><div class="stat-info"><h3>Completion Rate</h3><div class="stat-number">${rate}%</div></div><div class="stat-icon"><i class="fas fa-percent"></i></div></div>
      <div class="stat-card"><div class="stat-info"><h3>Total Orders</h3><div class="stat-number">${filtered.length}</div></div><div class="stat-icon"><i class="fas fa-chart-pie"></i></div></div>
    `;
    document.getElementById('tableHeader').innerHTML = `<tr><th>METRIC</th><th>VALUE</th><th>INSIGHT</th><\/tr>`;
    document.getElementById('tableBody').innerHTML = `
      <tr><td>Total Revenue<\/td><td><strong>${rev.toLocaleString()} MAD<\/strong><\/td><td>Sales in period<\/td><\/tr>
      <tr><td>Total Orders<\/td><td><strong>${filtered.length}<\/strong><\/td><td>Orders placed<\/td><\/tr>
      <tr><td>Completed Orders<\/td><td><strong>${completed}<\/strong><\/td><td>Delivered<\/td><\/tr>
      <tr><td>Average Order<\/td><td><strong>${avg.toLocaleString()} MAD<\/strong><\/td><td>Per transaction<\/td><\/tr>
    `;
  }
  
  window.dashboardShowDetails = function(id) {
    const order = allOrders.find(o => o.id === id);
    if(!order) return;
    document.getElementById('detailsTitle').innerHTML = `Order ${order.orderId} - ${order.customer}`;
    const container = document.getElementById('itemsContainer');
    if(!order.items?.length) container.innerHTML = '<div class="empty-state">No items<\/div>';
    else container.innerHTML = order.items.map(item => `
      <div class="product-item">
        <img src="${item.img || 'https://picsum.photos/id/104/55/55'}" onerror="this.src='https://picsum.photos/id/145/55/55'">
        <div style="flex:1"><strong>${item.name}</strong></div>
        <div>${item.price} MAD</div>
        <div>Qty: ${item.quantity || 1}</div>
      </div>
    `).join('');
    document.getElementById('detailsPanel').classList.add('open');
  };
  
  window.dashboardConfirmDelete = function(id) {
    orderToDelete = id;
    document.getElementById('deleteModal').classList.add('active');
  };
  
  function closeModal() {
    document.getElementById('deleteModal').classList.remove('active');
    orderToDelete = null;
  }
  
  document.getElementById('closeDetailsBtn').onclick = () => document.getElementById('detailsPanel').classList.remove('open');
  document.getElementById('searchInput').addEventListener('input', (e) => { currentSearch = e.target.value; renderCurrentPage(); });
  document.getElementById('refreshBtn').addEventListener('click', loadOrders);
  document.getElementById('cancelDeleteBtn').addEventListener('click', closeModal);
  document.getElementById('confirmDeleteBtn').addEventListener('click', async () => { if(orderToDelete) { await deleteOrder(orderToDelete); closeModal(); } });
  document.getElementById('deleteModal').addEventListener('click', (e) => { if(e.target === document.getElementById('deleteModal')) closeModal(); });
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentPage = tab.dataset.page;
      currentSearch = '';
      document.getElementById('searchInput').value = '';
      renderCurrentPage();
    });
  });
  
  db.collection('orders').onSnapshot(() => loadOrders());
  loadOrders();
}

// التحقق من حالة تسجيل الدخول عند تحميل الصفحة
auth.onAuthStateChanged(async (user) => {
  if (user && user.email === ALLOWED_EMAIL) {
    // مستخدم مسجل الدخول وهو المسموح له
    document.getElementById("loginCard").style.display = "none";
    document.getElementById("success").style.display = "block";
    setTimeout(() => {
      document.getElementById("success").style.display = "none";
      loadFullDashboard();
    }, 1200);
  } else if (user && user.email !== ALLOWED_EMAIL) {
    // مستخدم مسجل الدخول لكن ليس مسموحاً له
    await auth.signOut();
    document.getElementById("error").innerText = "❌ هذا الحساب غير مصرح له بدخول لوحة التحكم";
  }
  // else: لا يوجد مستخدم، يبقى نموذج تسجيل الدخول ظاهراً
});
</script>
