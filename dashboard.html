<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Store Manager Dashboard | Flowers Products</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at top,#5a0000,#1a0000);
  color:#fff;
  overflow-x:hidden;
}
.container{display:flex;min-height:100vh;flex-direction:row}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:linear-gradient(180deg,#3b0000,#1a0000);
  padding:20px;
  position:sticky;
  top:0;
  height:100vh;
  transition: all 0.3s ease;
  z-index:100;
  overflow-y:auto;
}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:35px;padding-bottom:15px;border-bottom:1px solid #a03333;}
.logo i{font-size:28px;color:#ff4d4d}
.logo div{font-weight:700;font-size:1rem;line-height:1.3}
.logo small{font-size:0.65rem;color:#ff9999;display:block}
.menu{list-style:none}
.menu li{
  padding:12px 15px;
  margin-bottom:8px;
  border-radius:12px;
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
  color:#ccc;
  transition:.2s;
  font-size:0.9rem;
}
.menu li i{width:22px;font-size:1.1rem}
.menu li:hover{background:#400000}
.menu li.active{
  background:linear-gradient(90deg,#ff2a2a,#a00000);
  color:#fff;
  box-shadow:0 4px 12px rgba(255,0,0,0.3);
}
.logout{
  position:absolute;
  bottom:20px;
  width:calc(100% - 40px);
  padding:12px;
  border-radius:12px;
  border:1px solid #700000;
  text-align:center;
  cursor:pointer;
  transition:.2s;
}
.logout:hover{background:#a00000}

/* MAIN */
.main{
  flex:1;
  padding:20px;
  overflow-y:auto;
  overflow-x:hidden;
  width:100%;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:15px;
  margin-bottom:25px;
}
.title h1{font-size:clamp(22px, 6vw, 28px);background:linear-gradient(135deg,#fff,#ffaaaa);-webkit-background-clip:text;background-clip:text;color:transparent}
.title p{color:#aaa;font-size:clamp(11px, 3vw, 13px)}
.date{
  border:1px solid #700000;
  padding:8px 15px;
  border-radius:10px;
  display:flex;
  align-items:center;
  gap:8px;
  font-size:0.8rem;
  background:rgba(0,0,0,0.3);
}

/* STATS CARDS */
.stats-cards{
  display:flex;
  gap:15px;
  margin-bottom:25px;
  flex-wrap:wrap;
}
.stat-card{
  flex:1;
  min-width:200px;
  background:linear-gradient(145deg,#4d0000,#1f0000);
  padding:18px;
  border-radius:18px;
  border:1px solid #6b0000;
  transition: transform 0.2s;
}
.stat-card:hover{transform:translateY(-3px)}
.stat-card h3{font-size:12px;color:#ccc;margin-bottom:8px;letter-spacing:1px}
.stat-card h2{font-size:clamp(20px, 5vw, 28px);font-weight:700}
.stat-card p{font-size:11px;color:#ffaaaa;margin-top:5px}

/* SEARCH */
.actions{
  display:flex;
  justify-content:space-between;
  gap:15px;
  margin-bottom:20px;
  flex-wrap:wrap;
}
.search{
  border:1px solid #700000;
  padding:10px 18px;
  border-radius:30px;
  flex:1;
  min-width:250px;
  background:rgba(0,0,0,0.3);
  color:#fff;
  font-size:0.85rem;
}
.search::placeholder{color:#aaa}
.refresh-btn{
  background:#4a1515;
  border:1px solid #700000;
  padding:10px 18px;
  border-radius:30px;
  cursor:pointer;
  color:#ffaaaa;
  transition:.2s;
}
.refresh-btn:hover{background:#a03333;color:#fff}

/* TABLES */
.table-wrapper{
  background:rgba(0,0,0,0.2);
  border-radius:18px;
  border:1px solid #5c0000;
  overflow-x:auto;
  margin-bottom:20px;
}
table{
  width:100%;
  border-collapse:collapse;
  min-width:650px;
}
th,td{padding:14px;text-align:left}
th{color:#aaa;font-size:12px;border-bottom:1px solid #5c0000;font-weight:500}
tr{border-bottom:1px solid #3a1515}
tbody tr:hover{background:#2a0808}

.status{
  padding:4px 12px;
  border-radius:20px;
  font-size:11px;
  font-weight:500;
  display:inline-block;
}
.pending{background:#7a4b00}
.completed{background:#0f5132}
.processing{background:#0d3b66}
.cancelled{background:#6a040f}
.delivered{background:#1e6b3b}

.badge{
  background:#4a1515;
  padding:4px 10px;
  border-radius:20px;
  font-size:11px;
}

.eye-btn{
  border:1px solid #700000;
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
  background:transparent;
  color:#ffaaaa;
  transition:.2s;
}
.eye-btn:hover{background:#400000;color:#fff;transform:scale(1.05)}

.loading{
  text-align:center;
  padding:40px;
  color:#ffaaaa;
}
.loading i{font-size:40px;animation:spin 1s linear infinite}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

.empty-message{
  text-align:center;
  padding:50px;
  color:#cb9e9e;
}
.empty-message i{font-size:50px;margin-bottom:15px;display:block}

/* DETAILS PANEL */
.details-section {
  margin-top: 20px;
  border-radius: 20px;
  background: linear-gradient(145deg, #2d0a0a, #1a0303);
  border: 1px solid #a03333;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  max-height: 0;
  opacity: 0;
  visibility: hidden;
  overflow: hidden;
}
.details-section.open {
  max-height: 800px;
  opacity: 1;
  visibility: visible;
  margin-bottom: 20px;
}
.details-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background: linear-gradient(135deg, #4a1515, #2a0606);
  border-bottom: 2px solid #c0392b;
}
.close-details {
  background: #6e1a1a;
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  color: white;
  cursor: pointer;
  transition: all 0.3s;
}
.close-details:hover{background:#c0392b;transform:rotate(90deg)}
.items-container{padding:20px;display:flex;flex-direction:column;gap:12px}
.product-card{
  background:#381010;
  border-radius:14px;
  padding:12px;
  display:flex;
  align-items:center;
  gap:15px;
  flex-wrap:wrap;
  border:1px solid #b14b4b;
  animation:slideUp 0.4s backwards;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.product-card:nth-child(1){animation-delay:0.05s}
.product-card:nth-child(2){animation-delay:0.1s}
.product-card:nth-child(3){animation-delay:0.15s}
.product-img{width:55px;height:55px;object-fit:cover;border-radius:12px;background:#f0e0d0}
.product-info{flex:1;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}

@media (max-width:768px){
  .container{flex-direction:column}
  .sidebar{width:100%;height:auto;position:relative;padding:12px}
  .menu{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
  .menu li{padding:8px 12px;margin:0}
  .logout{position:relative;bottom:auto;width:auto;margin-top:10px}
  .stat-card{min-width:calc(50% - 8px)}
  .product-card{flex-direction:column;text-align:center}
  .product-info{flex-direction:column;align-items:center}
  th,td{padding:10px;font-size:12px}
}
</style>
</head>
<body>
<div class="container">
  <div class="sidebar">
    <div class="logo"><i class="fas fa-seedling"></i> <div>FLOWERS DASH<br><small>Admin Panel</small></div></div>
    <ul class="menu">
      <li data-page="orders" class="active"><i class="fas fa-shopping-cart"></i> <span>Orders</span></li>
      <li data-page="customers"><i class="fas fa-users"></i> <span>Customers</span></li>
      <li data-page="stores"><i class="fas fa-store"></i> <span>Stores</span></li>
      <li data-page="analytics"><i class="fas fa-chart-line"></i> <span>Analytics</span></li>
      <li data-page="reports"><i class="fas fa-file-alt"></i> <span>Reports</span></li>
      <li data-page="notifications"><i class="fas fa-bell"></i> <span>Notifications</span></li>
    </ul>
    <div class="logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div>
  </div>

  <div class="main">
    <div class="header">
      <div class="title">
        <h1 id="pageTitle">📦 Orders Dashboard</h1>
        <p id="pageSubtitle">Real-time orders from checkout page</p>
      </div>
      <div class="date"><i class="fas fa-calendar"></i> <span id="currentDate"></span></div>
    </div>

    <div class="stats-cards" id="statsCards"></div>

    <div class="actions">
      <input class="search" placeholder="🔍 Search by order ID, customer, or phone..." id="globalSearch">
      <button class="refresh-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
    </div>

    <div class="table-wrapper">
      <table id="dataTable">
        <thead id="tableHeader"></thead>
        <tbody id="tableBody"><tr><td colspan="10" class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading orders from Firebase...<br><small>Connecting to flowers-products database</small></td></tr></tbody>
      </table>
    </div>

    <div id="detailsSection" class="details-section">
      <div class="details-header">
        <h3><i class="fas fa-box-open"></i> <span id="detailsTitle">Order Details</span></h3>
        <button id="closeDetailsBtn" class="close-details"><i class="fas fa-times"></i></button>
      </div>
      <div id="itemsContainer" class="items-container"></div>
    </div>
  </div>
</div>

<script>
  // ==================== FIREBASE CONFIGURATION (YOUR DATA) ====================
  const firebaseConfig = {
    apiKey: "AIzaSyDQ8GIxHnTz2m1U6aWGyZYPKJeXJbYKSZo",
    authDomain: "flowers-products.firebaseapp.com",
    projectId: "flowers-products",
    storageBucket: "flowers-products.firebasestorage.app",
    messagingSenderId: "107577839256",
    appId: "1:107577839256:web:922ffa87578f10d9088aed",
    measurementId: "G-Z4SHZZ9SHB"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const analytics = firebase.analytics();
  
  console.log("🔥 Firebase connected successfully to project: flowers-products");
  
  let allOrders = [];
  let currentPage = 'orders';
  
  document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
  
  // ==================== LOAD ORDERS FROM FIRESTORE ====================
  async function loadOrdersFromFirebase() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '<tr><td colspan="10" class="loading"><i class="fas fa-spinner fa-pulse"></i> Fetching orders from Firebase...<br><small>Collection: orders</small></td></tr>';
    
    try {
      // Get all orders from 'orders' collection
      const querySnapshot = await db.collection('orders').orderBy('createdAt', 'desc').get();
      allOrders = [];
      
      if (querySnapshot.empty) {
        console.log("📭 No orders found in Firebase. Waiting for checkout.html to add orders.");
        tbody.innerHTML = '<tr><td colspan="10" class="empty-message"><i class="fas fa-inbox"></i> No orders yet<br><small>Orders from checkout page will appear here automatically</small></td></tr>';
        updateStatsAndRender();
        return;
      }
      
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        allOrders.push({
          id: doc.id,
          orderId: data.orderId || data.id || doc.id.slice(0, 8),
          store: data.store || data.shippingStore || 'Flowers Marrakech',
          total: data.total || data.orderTotal || 0,
          customer: data.customerName || data.customer || 'Unknown',
          phone: data.phone || data.customerPhone || 'N/A',
          email: data.email || '',
          address: data.address || '',
          date: data.orderDate || (data.createdAt?.toDate?.()?.toLocaleDateString()) || new Date().toLocaleDateString(),
          status: data.orderStatus || data.status || 'pending',
          items: data.cartItems || data.items || [],
          paymentMethod: data.paymentMethod || 'Cash',
          notes: data.notes || ''
        });
      });
      
      console.log(`✅ Loaded ${allOrders.length} orders from Firebase`);
      updateStatsAndRender();
      
    } catch (error) {
      console.error("❌ Firebase Error:", error);
      tbody.innerHTML = `<tr><td colspan="10" class="empty-message"><i class="fas fa-exclamation-triangle"></i> Firebase Connection Error<br><small>${error.message}</small></td></tr>`;
    }
  }
  
  function updateStatsAndRender() {
    updateStatsCards();
    renderCurrentPage();
  }
  
  function updateStatsCards() {
    const totalOrders = allOrders.length;
    const totalRevenue = allOrders.reduce((sum, o) => sum + (o.total || 0), 0);
    const pendingOrders = allOrders.filter(o => o.status === 'pending').length;
    const completedOrders = allOrders.filter(o => o.status === 'completed' || o.status === 'delivered').length;
    
    document.getElementById('statsCards').innerHTML = `
      <div class="stat-card"><h3><i class="fas fa-chart-line"></i> TOTAL ORDERS</h3><h2>${totalOrders}</h2><p>From checkout page</p></div>
      <div class="stat-card"><h3><i class="fas fa-money-bill"></i> REVENUE</h3><h2>${totalRevenue.toLocaleString()} MAD</h2><p>All time sales</p></div>
      <div class="stat-card"><h3><i class="fas fa-clock"></i> PENDING</h3><h2>${pendingOrders}</h2><p>Awaiting processing</p></div>
      <div class="stat-card"><h3><i class="fas fa-check-circle"></i> COMPLETED</h3><h2>${completedOrders}</h2><p>Delivered orders</p></div>
    `;
  }
  
  // ==================== CUSTOMERS DATA ====================
  function getCustomersData() {
    const customersMap = new Map();
    allOrders.forEach(order => {
      const key = order.phone;
      if(!customersMap.has(key) && order.customer !== 'Unknown') {
        customersMap.set(key, {
          name: order.customer,
          phone: order.phone,
          email: order.email || `${order.customer.replace(/\s/g,'').toLowerCase()}@email.com`,
          totalOrders: 0,
          totalSpent: 0,
          lastOrderDate: order.date,
          firstOrderDate: order.date,
          lastOrderId: order.orderId
        });
      }
      if(customersMap.has(key)) {
        const cust = customersMap.get(key);
        cust.totalOrders++;
        cust.totalSpent += order.total;
        if(order.date > cust.lastOrderDate) cust.lastOrderDate = order.date;
      }
    });
    return Array.from(customersMap.values());
  }
  
  // ==================== STORES DATA ====================
  function getStoresData() {
    const storesMap = new Map();
    allOrders.forEach(order => {
      const storeName = order.store;
      if(!storesMap.has(storeName)) {
        storesMap.set(storeName, {
          name: storeName,
          totalOrders: 0,
          totalRevenue: 0,
          pending: 0,
          completed: 0,
          cancelled: 0
        });
      }
      const store = storesMap.get(storeName);
      store.totalOrders++;
      store.totalRevenue += order.total;
      if(order.status === 'pending') store.pending++;
      else if(order.status === 'completed' || order.status === 'delivered') store.completed++;
      else if(order.status === 'cancelled') store.cancelled++;
    });
    return Array.from(storesMap.values());
  }
  
  // ==================== RENDER FUNCTIONS ====================
  function renderCurrentPage(searchTerm = '') {
    const search = searchTerm.toLowerCase();
    
    if(currentPage === 'orders') renderOrdersPage(search);
    else if(currentPage === 'customers') renderCustomersPage(search);
    else if(currentPage === 'stores') renderStoresPage(search);
    else if(currentPage === 'analytics') renderAnalyticsPage();
    else if(currentPage === 'reports') renderReportsPage();
    else if(currentPage === 'notifications') renderNotificationsPage();
  }
  
  function renderOrdersPage(search) {
    document.getElementById('pageTitle').innerHTML = '📦 Orders Management';
    document.getElementById('pageSubtitle').innerHTML = `Real-time orders from checkout.html · ${allOrders.length} total orders`;
    
    let filtered = allOrders.filter(o => 
      o.orderId.toLowerCase().includes(search) || 
      o.customer.toLowerCase().includes(search) || 
      o.phone.includes(search)
    );
    
    document.getElementById('tableHeader').innerHTML = `<tr><th>ORDER ID</th><th>STORE</th><th>TOTAL</th><th>CUSTOMER</th><th>PHONE</th><th>DATE</th><th>STATUS</th><th>PAYMENT</th><th>ACTIONS</th></tr>`;
    
    const tbody = document.getElementById('tableBody');
    if(filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="9" class="empty-message"><i class="fas fa-search"></i> No matching orders found<br><small>Try different search term</small></td></tr>`;
      return;
    }
    
    tbody.innerHTML = filtered.map(order => `
      <tr>
        <td><strong>${order.orderId}</strong></td>
        <td>${order.store}</td>
        <td>${order.total.toLocaleString()} MAD</td>
        <td><i class="fas fa-user"></i> ${order.customer}</td>
        <td><i class="fas fa-phone"></i> ${order.phone}</td>
        <td>${order.date}</td>
        <td><span class="status ${order.status}">${order.status}</span></td>
        <td><span class="badge">${order.paymentMethod || 'Cash'}</span></td>
        <td><button class="eye-btn" onclick="showOrderDetails('${order.id}')"><i class="fas fa-eye"></i> View</button></td>
      </tr>
    `).join('');
  }
  
  function renderCustomersPage(search) {
    document.getElementById('pageTitle').innerHTML = '👥 Customers Directory';
    document.getElementById('pageSubtitle').innerHTML = 'All customers who placed orders from checkout page';
    
    let customers = getCustomersData();
    if(search) customers = customers.filter(c => c.name.toLowerCase().includes(search) || c.phone.includes(search));
    
    document.getElementById('tableHeader').innerHTML = `<tr><th>CUSTOMER NAME</th><th>PHONE</th><th>EMAIL</th><th>TOTAL ORDERS</th><th>TOTAL SPENT</th><th>LAST ORDER</th><th>ACTIONS</th></tr>`;
    
    const tbody = document.getElementById('tableBody');
    if(customers.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" class="empty-message"><i class="fas fa-users"></i> No customers found<br><small>Orders will appear here when customers check out</small></td></tr>`;
      return;
    }
    
    tbody.innerHTML = customers.map(cust => `
      <tr>
        <td><i class="fas fa-user-circle"></i> <strong>${cust.name}</strong></td>
        <td>${cust.phone}</td>
        <td>${cust.email}</td>
        <td><span class="badge">${cust.totalOrders} orders</span></td>
        <td><strong>${cust.totalSpent.toLocaleString()} MAD</strong></td>
        <td>${cust.lastOrderDate}</td>
        <td><button class="eye-btn" onclick="alert('Customer: ${cust.name}\nPhone: ${cust.phone}\nOrders: ${cust.totalOrders}\nTotal: ${cust.totalSpent} MAD')"><i class="fas fa-info-circle"></i> Info</button></td>
      </tr>
    `).join('');
  }
  
  function renderStoresPage(search) {
    document.getElementById('pageTitle').innerHTML = '🏪 Stores Performance';
    document.getElementById('pageSubtitle').innerHTML = 'Order statistics by store location';
    
    let stores = getStoresData();
    if(search) stores = stores.filter(s => s.name.toLowerCase().includes(search));
    
    document.getElementById('tableHeader').innerHTML = `<tr><th>STORE NAME</th><th>TOTAL ORDERS</th><th>TOTAL REVENUE</th><th>PENDING</th><th>COMPLETED</th><th>CANCELLED</th><th>SUCCESS RATE</th></tr>`;
    
    const tbody = document.getElementById('tableBody');
    if(stores.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" class="empty-message"><i class="fas fa-store"></i> No store data available</td></tr>`;
      return;
    }
    
    tbody.innerHTML = stores.map(store => {
      const successRate = store.totalOrders > 0 ? Math.round((store.completed / store.totalOrders) * 100) : 0;
      return `
        <tr>
          <td><i class="fas fa-store"></i> <strong>${store.name}</strong></td>
          <td>${store.totalOrders} orders</td>
          <td>${store.totalRevenue.toLocaleString()} MAD</td>
          <td><span class="status pending">${store.pending}</span></td>
          <td><span class="status completed">${store.completed}</span></td>
          <td><span class="status cancelled">${store.cancelled}</span></td>
          <td><div class="badge">✅ ${successRate}%</div></td>
        </tr>
      `;
    }).join('');
  }
  
  function renderAnalyticsPage() {
    document.getElementById('pageTitle').innerHTML = '📊 Business Analytics';
    document.getElementById('pageSubtitle').innerHTML = 'Key insights and performance metrics';
    
    const totalRev = allOrders.reduce((s,o) => s + o.total, 0);
    const avgOrder = allOrders.length > 0 ? Math.round(totalRev / allOrders.length) : 0;
    const pendingCount = allOrders.filter(o => o.status === 'pending').length;
    const completedCount = allOrders.filter(o => o.status === 'completed' || o.status === 'delivered').length;
    const completionRate = allOrders.length > 0 ? Math.round((completedCount / allOrders.length) * 100) : 0;
    const topCustomer = getCustomersData().sort((a,b) => b.totalSpent - a.totalSpent)[0];
    
    document.getElementById('statsCards').innerHTML = `
      <div class="stat-card"><h3>💰 AVG ORDER VALUE</h3><h2>${avgOrder} MAD</h2><p>Per transaction average</p></div>
      <div class="stat-card"><h3>📊 COMPLETION RATE</h3><h2>${completionRate}%</h2><p>${completedCount}/${allOrders.length} orders</p></div>
      <div class="stat-card"><h3>⭐ TOP CUSTOMER</h3><h2>${topCustomer?.name?.split(' ')[0] || '-'}</h2><p>${topCustomer?.totalSpent?.toLocaleString() || 0} MAD spent</p></div>
      <div class="stat-card"><h3>🏪 ACTIVE STORES</h3><h2>${getStoresData().length}</h2><p>Store locations</p></div>
    `;
    
    document.getElementById('tableHeader').innerHTML = `<tr><th>METRIC</th><th>VALUE</th><th>INSIGHT</th></tr>`;
    document.getElementById('tableBody').innerHTML = `
      <tr><td>Total Revenue</td><td><strong>${totalRev.toLocaleString()} MAD</strong></td><td>All time sales revenue</td></tr>
      <tr><td>Total Orders</td><td><strong>${allOrders.length}</strong></td><td>Orders placed via checkout</td></tr>
      <tr><td>Pending Orders</td><td><strong>${pendingCount}</strong></td><td>Awaiting processing</td></tr>
      <tr><td>Completed Orders</td><td><strong>${completedCount}</strong></td><td>Successfully delivered</td></tr>
      <tr><td>Average Order</td><td><strong>${avgOrder} MAD</strong></td><td>Per transaction average</td></tr>
    `;
  }
  
  function renderReportsPage() {
    document.getElementById('pageTitle').innerHTML = '📑 Reports & Export';
    document.getElementById('pageSubtitle').innerHTML = 'Download business reports';
    document.getElementById('statsCards').innerHTML = `<div class="stat-card"><h3>📊 REPORT READY</h3><h2>${allOrders.length} Orders</h2><p>Ready to export</p></div>`;
    document.getElementById('tableHeader').innerHTML = `<td><th>REPORT TYPE</th><th>DATA</th><th>FORMAT</th><th>ACTION</th></tr>`;
    document.getElementById('tableBody').innerHTML = `
      <tr><td>Orders Summary</td><td>${allOrders.length} orders · ${getCustomersData().length} customers</td><td>CSV / JSON</td><td><button class="eye-btn" onclick="exportOrders()"><i class="fas fa-download"></i> Export</button></td></tr>
      <tr><td>Customer List</td><td>${getCustomersData().length} unique customers</td><td>CSV</td><td><button class="eye-btn" onclick="alert('Customer list exported to console')"><i class="fas fa-download"></i> Export</button></td></tr>
      <tr><td>Store Performance</td><td>${getStoresData().length} stores</td><td>CSV</td><td><button class="eye-btn" onclick="alert('Store report ready')"><i class="fas fa-download"></i> Export</button></td></tr>
    `;
  }
  
  function renderNotificationsPage() {
    document.getElementById('pageTitle').innerHTML = '🔔 Notifications';
    document.getElementById('pageSubtitle').innerHTML = 'System updates and alerts';
    document.getElementById('statsCards').innerHTML = `<div class="stat-card"><h3>🔔 SYSTEM STATUS</h3><h2>Online</h2><p>Firebase connected</p></div>`;
    document.getElementById('tableHeader').innerHTML = `<tr><th>TIME</th><th>MESSAGE</th><th>STATUS</th></tr>`;
    document.getElementById('tableBody').innerHTML = `
      <tr><td>Just now</td><td>✅ Firebase connected to flowers-products</td><td><span class="status completed">Active</span></td></tr>
      <tr><td>${new Date().toLocaleTimeString()}</td><td>📦 ${allOrders.length} orders loaded from database</td><td><span class="status completed">Synced</span></td></tr>
      <tr><td>Today</td><td>👥 ${getCustomersData().length} customers registered</td><td><span class="status processing">Updated</span></td></tr>
      <tr><td>Now</td><td>🔄 Real-time listener active - new orders appear instantly</td><td><span class="status completed">Live</span></td></tr>
    `;
  }
  
  // Export orders function
  window.exportOrders = function() {
    const data = JSON.stringify(allOrders, null, 2);
    const blob = new Blob([data], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `orders_export_${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    alert(`${allOrders.length} orders exported successfully!`);
  };
  
  // Show order details
  window.showOrderDetails = function(orderId) {
    const order = allOrders.find(o => o.id === orderId);
    if(!order) return;
    
    const container = document.getElementById('itemsContainer');
    document.getElementById('detailsTitle').innerHTML = `Order ${order.orderId} - ${order.customer}`;
    
    if(!order.items || order.items.length === 0) {
      container.innerHTML = '<div class="empty-message"><i class="fas fa-box"></i> No items in this order</div>';
    } else {
      container.innerHTML = order.items.map((item, idx) => `
        <div class="product-card" style="animation-delay:${idx*0.05}s">
          <img class="product-img" src="${item.img || item.image || 'https://picsum.photos/id/145/60/60'}" onerror="this.src='https://picsum.photos/id/145/60/60'">
          <div class="product-info">
            <div><i class="fas fa-tag"></i> <strong>${item.name}</strong></div>
            <div><i class="fas fa-coins"></i> ${item.price || item.pricePerItem || 0} MAD</div>
            <div><i class="fas fa-cubes"></i> Quantity: ${item.quantity || 1}</div>
            <div><i class="fas fa-calculator"></i> Subtotal: ${(item.price || 0) * (item.quantity || 1)} MAD</div>
          </div>
        </div>
      `).join('');
    }
    document.getElementById('detailsSection').classList.add('open');
  };
  
  // Close details
  document.getElementById('closeDetailsBtn').onclick = () => {
    document.getElementById('detailsSection').classList.remove('open');
  };
  
  // Search functionality
  document.getElementById('globalSearch').addEventListener('input', (e) => renderCurrentPage(e.target.value));
  document.getElementById('refreshBtn').addEventListener('click', () => loadOrdersFromFirebase());
  
  // Menu navigation
  document.querySelectorAll('.menu li').forEach(li => {
    li.addEventListener('click', () => {
      document.querySelectorAll('.menu li').forEach(l => l.classList.remove('active'));
      li.classList.add('active');
      currentPage = li.dataset.page;
      document.getElementById('globalSearch').value = '';
      renderCurrentPage('');
    });
  });
  
  // Logout
  document.getElementById('logoutBtn').onclick = () => { alert('Logged out. Redirecting to login...'); };
  
  // ==================== REAL-TIME LISTENER ====================
  // This ensures new orders from checkout.html appear instantly
  db.collection('orders').onSnapshot((snapshot) => {
    console.log("🔄 Real-time update detected! Refreshing orders...");
    loadOrdersFromFirebase();
  });
  
  // Initial load
  loadOrdersFromFirebase();
  
  console.log("🎉 Dashboard ready! Waiting for orders from checkout.html");
  console.log("📝 Make sure your checkout page saves orders to Firestore collection: 'orders'");
</script>
</body>
</html>
