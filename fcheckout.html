<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Checkout - Fleuriste Marrakech</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  
  <style>
    :root {
      --primary-red: #8B0000;
      --primary-red-dark: #660000;
      --text-dark: #2C3E50;
      --text-light: #7F8C8D;
      --border-light: #ECF0F1;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container { max-width: 1000px; margin: 0 auto; }
    
    .back-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: var(--primary-red);
      color: white;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    
    .header {
      text-align: center;
      margin-bottom: 25px;
      padding-top: 10px;
    }
    
    .header h1 {
      font-size: 2rem;
      color: var(--primary-red);
    }
    
    .cart-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 40px;
    }
    
    .cart-items {
      flex: 1;
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow);
    }
    
    .cart-summary {
      width: 320px;
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow);
    }
    
    .item-card {
      display: flex;
      gap: 12px;
      padding: 15px 0;
      border-bottom: 1px solid var(--border-light);
      align-items: center;
    }
    
    .item-image {
      width: 70px;
      height: 70px;
      border-radius: 12px;
      background: #eee;
    }
    
    .item-image img { width: 100%; height: 100%; object-fit: cover; }
    
    .item-details { flex: 1; }
    
    .item-name { font-weight: 600; }
    
    .item-price { color: var(--primary-red); font-weight: 600; }
    
    .item-controls {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    
    .quantity-btn, .remove-item {
      background: #f0f0f0;
      border: none;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 5px;
    }
    
    .quantity-btn:hover, .remove-item:hover {
      background: var(--primary-red);
      color: white;
    }
    
    .summary-total {
      display: flex;
      justify-content: space-between;
      margin: 20px 0;
      padding: 15px 0;
      border-top: 2px solid var(--primary-red);
      font-size: 1.2rem;
      font-weight: 700;
    }
    
    .customer-info {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .customer-info h3 {
      color: var(--primary-red);
      margin-bottom: 15px;
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 5px;
    }
    
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border-light);
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
    }
    
    .checkout-btn {
      width: 100%;
      background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
    }
    
    .checkout-btn:hover { transform: translateY(-2px); }
    .checkout-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .empty-cart { text-align: center; padding: 30px 0; }
    
    .browse-btn {
      background: var(--primary-red);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      z-index: 1000;
      display: none;
      white-space: nowrap;
    }
    
    .toast.show { display: block; animation: fadeInUp 0.3s ease; }
    .toast.error { background: #c0392b; }
    .toast.success { background: #27ae60; }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    
    @media (max-width: 768px) {
      .cart-container { flex-direction: column; }
      .cart-summary { width: 100%; }
      .toast { white-space: normal; text-align: center; max-width: 90%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="back-btn" id="back-button">
      <i class="fas fa-arrow-left"></i>
    </div>
    
    <div class="header">
      <h1>🌸 Fleuriste Marrakech</h1>
      <p>Complete your flower order</p>
    </div>
    
    <div class="cart-container">
      <div class="cart-items">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
          <h2 id="cart-count">Order Items (0)</h2>
          <button class="clear-cart" id="clear-cart" style="background: none; border: none; color: var(--primary-red); cursor: pointer;">
            <i class="fas fa-trash"></i> Clear All
          </button>
        </div>
        <div id="cart-items-container"></div>
      </div>
      
      <div class="cart-summary">
        <h2>Order Summary</h2>
        <div class="summary-total">
          <span>Total Amount</span>
          <span class="total-price" id="total-price">0.00 MAD</span>
        </div>
        
        <div class="customer-info">
          <h3><i class="fas fa-truck"></i> Delivery Information</h3>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="customerName" placeholder="Enter your full name">
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="customerPhone" placeholder="Enter your phone number">
          </div>
          <div class="form-group">
            <label>Delivery Address</label>
            <textarea id="customerAddress" rows="3" placeholder="Enter your delivery address"></textarea>
          </div>
        </div>
        
        <button class="checkout-btn" id="checkout-btn">
          <i class="fab fa-whatsapp"></i> Complete Order via WhatsApp
        </button>
        <p style="text-align: center; font-size: 0.75rem; margin-top: 10px; color: var(--text-light);">
          <i class="fas fa-info-circle"></i> سيتم حفظ الطلب وإرساله عبر الواتساب بنفس رقم الطلب
        </p>
      </div>
    </div>
  </div>
  
  <div id="toast" class="toast"></div>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDQ8GIxHnTz2m1U6aWGyZYPKJeXJbYKSZo",
      authDomain: "flowers-products.firebaseapp.com",
      projectId: "flowers-products",
      storageBucket: "flowers-products.firebasestorage.app",
      messagingSenderId: "107577839256",
      appId: "1:107577839256:web:922ffa87578f10d9088aed"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    const CART_KEY = 'fleuristeCart';
    const WHATSAPP_NUMBER = "212642620325";
    
    let cart = [];
    
    // Toast function
    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }
    
    // Generate unique order ID (مخصص ومرتب حسب التاريخ)
    function generateOrderId() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      const random = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
      
      // مثال: ORD-20251204-143025-123
      return `ORD-${year}${month}${day}-${hours}${minutes}${seconds}-${random}`;
    }
    
    // Get cart from localStorage
    function getCart() {
      try {
        const cartData = localStorage.getItem(CART_KEY);
        return cartData ? JSON.parse(cartData) : [];
      } catch(e) { 
        return []; 
      }
    }
    
    function saveCart() {
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
    }
    
    function renderCartItems() {
      const container = document.getElementById('cart-items-container');
      const cartCount = document.getElementById('cart-count');
      const totalPriceElement = document.getElementById('total-price');
      
      container.innerHTML = '';
      
      if (cart.length === 0) {
        container.innerHTML = `
          <div class="empty-cart">
            <i class="fas fa-shopping-basket" style="font-size: 4rem; color: #ccc;"></i>
            <p>Your basket is empty</p>
            <a href="flowers.html" class="browse-btn">Browse Flowers</a>
          </div>
        `;
        cartCount.textContent = 'Order Items (0)';
        totalPriceElement.textContent = '0.00 MAD';
        return;
      }
      
      let total = 0;
      cart.forEach((item, index) => {
        const price = item.basePrice || item.price || 0;
        const qty = item.quantity || 1;
        total += price * qty;
        
        const itemDiv = document.createElement('div');
        itemDiv.className = 'item-card';
        itemDiv.innerHTML = `
          <div class="item-details">
            <div class="item-name">${item.name}</div>
            <div class="item-price">${price.toFixed(2)} MAD</div>
            <div class="item-controls">
              <button class="quantity-btn minus-btn" data-index="${index}">-</button>
              <span style="min-width: 30px; text-align: center;">${qty}</span>
              <button class="quantity-btn plus-btn" data-index="${index}">+</button>
              <button class="remove-item" data-index="${index}"><i class="fas fa-trash"></i> Remove</button>
            </div>
          </div>
        `;
        container.appendChild(itemDiv);
      });
      
      cartCount.textContent = `Order Items (${cart.reduce((sum, item) => sum + (item.quantity || 1), 0)})`;
      totalPriceElement.textContent = total.toFixed(2) + ' MAD';
      
      // Add event listeners
      document.querySelectorAll('.minus-btn').forEach(btn => {
        btn.addEventListener('click', () => updateQuantity(parseInt(btn.dataset.index), -1));
      });
      document.querySelectorAll('.plus-btn').forEach(btn => {
        btn.addEventListener('click', () => updateQuantity(parseInt(btn.dataset.index), 1));
      });
      document.querySelectorAll('.remove-item').forEach(btn => {
        btn.addEventListener('click', () => removeItem(parseInt(btn.dataset.index)));
      });
    }
    
    function calculateTotal() {
      return cart.reduce((sum, item) => {
        const price = item.basePrice || item.price || 0;
        const qty = item.quantity || 1;
        return sum + (price * qty);
      }, 0);
    }
    
    function updateQuantity(idx, change) {
      if (!cart[idx]) return;
      cart[idx].quantity = (cart[idx].quantity || 1) + change;
      if (cart[idx].quantity < 1) cart[idx].quantity = 1;
      saveCart();
      renderCartItems();
    }
    
    function removeItem(idx) {
      cart.splice(idx, 1);
      saveCart();
      renderCartItems();
    }
    
    function clearCart() {
      if (cart.length === 0) return;
      if (confirm("Clear your basket?")) {
        cart = [];
        saveCart();
        renderCartItems();
        showToast("Basket cleared!", 'success');
      }
    }
    
    // Save order to Firebase with CUSTOM ID (نفس الID الذي سيظهر في الواتساب)
    async function saveOrderToFirebase(customOrderId) {
      const total = calculateTotal();
      
      const orderData = {
        orderId: customOrderId,  // ✅ نفس الID المخصص
        orderDate: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }),
        orderTime: new Date().toLocaleTimeString(),
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        customerName: customerNameInput.value.trim() || "Guest",
        phone: customerPhoneInput.value.trim() || "N/A",
        address: customerAddressInput.value.trim() || "N/A",
        store: "Fleuriste Marrakech",
        total: total,
        paymentMethod: "Cash on Delivery",
        items: cart.map(item => ({
          name: item.name,
          price: item.basePrice || item.price || 0,
          quantity: item.quantity || 1,
          img: item.img || ""
        })),
        totalItems: cart.reduce((sum, item) => sum + (item.quantity || 1), 0)
      };
      
      try {
        // استخدام set مع ID مخصص بدلاً من add
        const docRef = db.collection('orders').doc(customOrderId);
        await docRef.set(orderData);
        console.log("✅ Order saved with custom ID:", customOrderId);
        return { success: true, firebaseId: customOrderId };
      } catch (error) {
        console.error("❌ Firebase Error:", error);
        return { success: false, error: error.message };
      }
    }
    
    // Generate WhatsApp message with the SAME ID
    function generateWhatsAppMessage(orderId) {
      const total = calculateTotal();
      const customerName = customerNameInput.value.trim() || "Guest";
      const customerPhone = customerPhoneInput.value.trim() || "N/A";
      const customerAddress = customerAddressInput.value.trim() || "N/A";
      
      let message = `🌸 *FLEURISTE MARRAKECH - NEW ORDER* 🌸\n\n`;
      message += `*Order ID:* ${orderId}\n`;
      message += `━━━━━━━━━━━━━━━━━━━━\n`;
      message += `*👤 Customer Details:*\n`;
      message += `Name: ${customerName}\n`;
      message += `Phone: ${customerPhone}\n`;
      message += `Address: ${customerAddress}\n\n`;
      message += `━━━━━━━━━━━━━━━━━━━━\n`;
      message += `*🛍️ Order Details:*\n`;
      
      cart.forEach((item, index) => {
        const price = item.basePrice || item.price || 0;
        const quantity = item.quantity || 1;
        const totalPrice = price * quantity;
        message += `${index + 1}. ${item.name}\n`;
        message += `   ${quantity} x ${price.toFixed(2)} MAD = ${totalPrice.toFixed(2)} MAD\n`;
      });
      
      message += `━━━━━━━━━━━━━━━━━━━━\n`;
      message += `*💰 Total: ${total.toFixed(2)} MAD*\n`;
      message += `*💳 Payment: Cash on Delivery*\n\n`;
      message += `✅ Please confirm this order. Thank you! 💐`;
      
      return message;
    }
    
    // Open WhatsApp function
    function openWhatsApp(message) {
      const encodedMessage = encodeURIComponent(message);
      const waMeUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodedMessage}`;
      const apiUrl = `https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodedMessage}`;
      
      const newWindow = window.open(waMeUrl, '_blank');
      
      if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
        window.location.href = apiUrl;
      }
      
      return true;
    }
    
    // Main process
    async function processOrder() {
      // Validation
      if (cart.length === 0) {
        showToast("Your basket is empty!", 'error');
        return;
      }
      
      if (!customerNameInput.value.trim()) {
        showToast("Please enter your full name", 'error');
        customerNameInput.focus();
        return;
      }
      
      if (!customerPhoneInput.value.trim()) {
        showToast("Please enter your phone number", 'error');
        customerPhoneInput.focus();
        return;
      }
      
      if (!customerAddressInput.value.trim()) {
        showToast("Please enter your delivery address", 'error');
        customerAddressInput.focus();
        return;
      }
      
      // Disable button
      const checkoutBtn = document.getElementById('checkout-btn');
      checkoutBtn.disabled = true;
      checkoutBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Saving order...';
      
      try {
        // Step 1: Generate unique order ID (هذا الID سيكون نفسه في Firebase وواتساب)
        const orderId = generateOrderId();
        console.log("Generated Order ID:", orderId);
        
        // Step 2: Save to Firebase with the custom ID
        showToast("Saving order to database...", 'info');
        const saveResult = await saveOrderToFirebase(orderId);
        
        if (!saveResult.success) {
          throw new Error(saveResult.error);
        }
        
        showToast(`Order saved! ID: ${orderId}`, 'success');
        
        // Step 3: Generate message for WhatsApp with the SAME ID
        const whatsappMessage = generateWhatsAppMessage(orderId);
        
        // Step 4: Open WhatsApp
        showToast("Opening WhatsApp...", 'info');
        openWhatsApp(whatsappMessage);
        
        // Step 5: Clear cart
        cart = [];
        saveCart();
        renderCartItems();
        
        // Reset button
        setTimeout(() => {
          checkoutBtn.disabled = false;
          checkoutBtn.innerHTML = '<i class="fab fa-whatsapp"></i> Complete Order via WhatsApp';
        }, 3000);
        
      } catch (error) {
        console.error("Error:", error);
        showToast("Error: " + error.message, 'error');
        checkoutBtn.disabled = false;
        checkoutBtn.innerHTML = '<i class="fab fa-whatsapp"></i> Complete Order via WhatsApp';
      }
    }
    
    // DOM elements
    const customerNameInput = document.getElementById('customerName');
    const customerPhoneInput = document.getElementById('customerPhone');
    const customerAddressInput = document.getElementById('customerAddress');
    const clearCartBtn = document.getElementById('clear-cart');
    const checkoutBtn = document.getElementById('checkout-btn');
    const backButton = document.getElementById('back-button');
    
    // Event listeners
    if (clearCartBtn) clearCartBtn.addEventListener('click', clearCart);
    if (checkoutBtn) checkoutBtn.addEventListener('click', processOrder);
    if (backButton) backButton.addEventListener('click', () => window.location.href = 'flowers.html');
    
    // Initialize
    function init() {
      cart = getCart();
      renderCartItems();
      console.log("✅ Page loaded, cart items:", cart.length);
    }
    
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
